name: Kunlun Unit Test

on: [push, pull_request]

jobs:
  test-kunlun:
    runs-on: [self-hosted, test-0]
      # 2. 【关键】全局环境变量
      # 放在这里，整个 Job 的所有步骤（包括 checkout 和 pip）都会自动生效
    env:
      http_proxy: http://10.63.229.53:8891
      https_proxy: http://10.63.229.53:8891
      # 建议加上 no_proxy，防止连接本地服务或内网 git 出问题
      no_proxy: localhost,127.0.0.1,0.0.0.0,.baidu.com,.baidu-int.com
      # 显式指定 vLLM 编译目标，防止安装主库时因为它去瞎找 CUDA 驱动而报错
      VLLM_TARGET_DEVICE: empty 
    

    steps:
      # --- 第一步：全局激活环境 (最关键的一步) ---
      - name: Activate Conda Environment Globally
        run: |
          # 1. 定义你的环境 bin 目录 (根据您提供的信息)
          # 注意：Conda 环境的可执行文件都在 /bin 目录下，必须精确指向这里
          CONDA_BIN="/root/miniconda/envs/python310_torch25_cuda/bin"
          
          # 2. 【核心魔法】将这个路径写入 GITHUB_PATH
          # 这样后续所有 Step 里的 'python' 和 'pip' 命令都会默认用这个目录下的
          echo "$CONDA_BIN" >> $GITHUB_PATH
          
          # 3. (可选) 设置 CONDA_PREFIX 变量，有些编译脚本依赖这个
          echo "CONDA_PREFIX=/root/miniconda/envs/python310_torch25_cuda" >> $GITHUB_ENV

      # --- 第二步：验证激活是否成功 ---
      - name: Verify Activation
        run: |
          echo "Which python am I using?"
          which python
          # 输出必须是: /root/miniconda/envs/python310_torch25_cuda/bin/python
          
          echo "Python Version:"
          python --version
          # 输出必须是: Python 3.10.x

          echo "Check PIP location:"
          which pip
          # 输出必须是: .../bin/pip

      # --- 第三步：安装 vLLM 主库 ---
      - name: Checkout upstream vllm
        uses: actions/checkout@v4
        with:
          repository: vllm-project/vllm
          ref: v0.11.0
          path: ./vllm-upstream

      - name: Install vllm upstream
        working-directory: ./vllm-upstream
        run: |
          # 【重要技巧】
          # 即使激活了环境，建议永远使用 'python -m pip' 而不是直接 'pip'
          # 这能确保 100% 使用当前 python 对应的 pip，避免系统缓存干扰
          
          echo "Pre-installing build tools..."
          python -m pip install cmake ninja packaging setuptools wheel --default-timeout=100

          echo "Installing vllm..."
          # --no-build-isolation: 关键参数！防止 pip 偷偷用系统 python 去建虚拟环境导致报错
          # --no-deps: 既然你环境里 torch 都是好的，别让它乱升级/降级
          python -m pip install . --no-build-isolation --no-deps --default-timeout=100

      # --- 第四步：安装 vLLM-Kunlun ---
      - name: Checkout vllm-kunlun code
        uses: actions/checkout@v4

      - name: Install vllm-kunlun
        run: |
          # 后续步骤都不需要再配置路径了，直接用
          python -m pip install -v -e . --no-build-isolation --default-timeout=100
          
          # 您的其他安装命令...
          # wget ...
          # bash ...
      - name: Install pytest
        run: 
          python -m pip install pytest 
      # --- 第五步：运行测试 ---
      - name: Run Unit Test
        run: |
          xpu-smi || echo "Warning: xpu-smi failed"
          # 这里的 pytest 也会自动用 conda 环境里的
          pytest -v -s tests/ut