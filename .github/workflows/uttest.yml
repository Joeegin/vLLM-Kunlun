name: Kunlun Unit Test

on: [push, pull_request]

jobs:
  test-kunlun:
    runs-on: [self-hosted, test-0]
      # 2. 【关键】全局环境变量
      # 放在这里，整个 Job 的所有步骤（包括 checkout 和 pip）都会自动生效
    env:
      http_proxy: http://10.63.229.53:8891
      https_proxy: http://10.63.229.53:8891
      # 建议加上 no_proxy，防止连接本地服务或内网 git 出问题
      no_proxy: localhost,127.0.0.1,0.0.0.0,.baidu.com,.baidu-int.com
      # 显式指定 vLLM 编译目标，防止安装主库时因为它去瞎找 CUDA 驱动而报错
      VLLM_TARGET_DEVICE: empty 
    

    steps:
      # --- 第一步：全局环境设置 ---
      - name: Configure Environment
        run: |
          # 1. 设置 Python 路径
          CONDA_BIN="/root/miniconda/envs/python310_torch25_cuda/bin"
          echo "$CONDA_BIN" >> $GITHUB_PATH
          
          # 2. 打印一下确认
          echo "Environment configured. Next, checking out code..."

      # --- 第二步：并行拉取代码 (关键修改) ---
      
      # 1. 拉取上游代码 -> 放入 vllm-upstream 文件夹
      - name: Checkout upstream vllm
        uses: actions/checkout@v4
        with:
          repository: vllm-project/vllm
          ref: v0.11.0
          path: ./vllm-upstream

      # 2. 拉取您的代码 -> 放入 vllm-kunlun 文件夹 (不再放在根目录)
      - name: Checkout vllm-kunlun code
        uses: actions/checkout@v4
        with:
          path: ./vllm-kunlun  # 【强制指定目录，防止丢失】

      # --- 第三步：安装依赖 ---
      
      - name: Install Build Tools
        run: |
          python -m pip install cmake ninja packaging setuptools wheel pytest pytest-cov --default-timeout=100

      - name: Install vllm upstream
        working-directory: ./vllm-upstream  # 进入上游目录
        run: |
          # 安装上游库
          python -m pip install . --no-build-isolation --no-deps --default-timeout=100

      - name: Install vllm-kunlun
        working-directory: ./vllm-kunlun   # 【关键】进入您的代码目录
        run: |
          echo "Installing my project..."
          python -m pip install -v -e . --no-build-isolation --default-timeout=100

          # 下载并安装昆仑相关包 (保持您原来的逻辑)
          # 注意：这里的 wget 会下载到 ./vllm-kunlun 目录下，没问题
          # wget -O xpytorch-cp310-torch251-ubuntu2004-x64.run https://baidu-kunlun-public.su.bcebos.com/v1/baidu-kunlun-share/1130/xpytorch-cp310-torch251-ubuntu2004-x64.run?authorization=bce-auth-v1%2FALTAKypXxBzU7gg4Mk4K4c6OYR%2F2025-12-02T05%3A01%3A27Z%2F-1%2Fhost%2Ff3cf499234f82303891aed2bcb0628918e379a21e841a3fac6bd94afef491ff7
          # bash xpytorch-cp310-torch251-ubuntu2004-x64.run
          
          # ... (其他 pip install 命令保持不变)

      # --- 第四步：运行测试 ---
      
      - name: Debug & Run Test
        working-directory: ./vllm-kunlun  # 【关键】必须进入这个目录跑测试
        run: |
          echo "Checking files in vllm-kunlun:"
          ls -F
          
          echo "Checking tests folder:"
          ls -F tests/ || echo "tests folder still missing!"
          
          echo "Running Pytest..."
          xpu-smi || echo "Warning: xpu-smi failed"
          
          # 现在路径肯定是正确的了
          pytest -v -s --cov tests/ut