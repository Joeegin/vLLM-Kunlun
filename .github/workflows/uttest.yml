name: Kunlun Unit Test

on: [push, pull_request]

jobs:
  test-kunlun:
    runs-on: [self-hosted, test-0]

    env:
      http_proxy: http://10.63.229.53:8891
      https_proxy: http://10.63.229.53:8891
      no_proxy: localhost,127.0.0.1,0.0.0.0,.baidu.com,.baidu-int.com
      # 保持这个变量，以防万一
      VLLM_TARGET_DEVICE: empty 

    steps:
      # --- 第一步：环境配置 ---
      - name: Configure Environment
        run: |
          CONDA_BIN="/root/miniconda/envs/python310_torch25_cuda/bin"
          echo "$CONDA_BIN" >> $GITHUB_PATH
          echo "PY=$CONDA_BIN/python" >> $GITHUB_ENV
          
          # 【新增】解决 Git 代理问题 (防止拉代码失败)
          git config --global http.proxy http://10.63.229.53:8891
          git config --global https.proxy https://10.63.229.53:8891
          git config --global http.sslVerify false

      # --- 第二步：拉取 vLLM-Kunlun 代码 ---
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # 加上 fetch-depth: 0 避免浅克隆带来的 git 报错
          fetch-depth: 0

      # --- 第三步：安装当前项目 (vLLM-Kunlun) ---
      - name: Install Project
        run: |
          echo "Installing vLLM-Kunlun..."
          # 1. 补齐 hatchling 等构建工具 (以防万一环境里没装)
          $PY -m pip install hatchling editables pytest pytest-cov
          
          # 2. 安装本项目
          # --no-deps: 关键！千万别让它去 PyPI 重新下载 vllm，直接用我们预装好的
          # -e .: 挂载当前代码
          $PY -m pip install -e . --no-deps --no-build-isolation

      # --- 第四步：运行测试 ---
      - name: Run Unit Test
        run: |
          xpu-smi || echo "Warning: xpu-smi not found"

          # 【核心修复】自动设置库路径，解决 'libxpu_blas.so' 和 '符号丢失' 问题
          TORCH_LIB_PATH=$($PY -c "import os, torch; print(os.path.join(os.path.dirname(torch.__file__), 'lib'))")
          
          # 1. 设置 LD_LIBRARY_PATH
          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:$TORCH_LIB_PATH:/usr/local/lib
          
          # 2. 设置 LD_PRELOAD (强制加载 CPU 版 Torch 核心库，解决符号缺失)
          export LD_PRELOAD=$TORCH_LIB_PATH/libtorch_cpu.so
          
          echo "Debug Environment:"
          echo "LD_LIBRARY_PATH: $LD_LIBRARY_PATH"
          echo "LD_PRELOAD: $LD_PRELOAD"

          # 运行测试
          pytest -v -s --cov tests/ut -p no:warnings