name: Kunlun Unit Test

on: [push, pull_request]

jobs:
  test-kunlun:
    # 既然是 Root 运行 Runner，直接跑在宿主机 (容器内) 即可
    runs-on: [self-hosted, test-0]

    env:
      http_proxy: http://10.63.229.53:8891
      https_proxy: http://10.63.229.53:8891
      no_proxy: localhost,127.0.0.1,0.0.0.0,.baidu.com,.baidu-int.com
      # 即使环境装好了，这个变量最好留着，防止某些内部逻辑会有偏差
      VLLM_TARGET_DEVICE: empty 

    steps:
      # --- 第一步：环境“指路” ---
      # 只要把 PATH 指过去，后面的 python/pip/pytest 就全是那个环境里的了
      - name: Configure Environment
        run: |
          CONDA_BIN="/root/miniconda/envs/python310_torch25_cuda/bin"
          
          # 1. 强制将 Conda bin 目录加到系统 PATH 最前面
          echo "$CONDA_BIN" >> $GITHUB_PATH
          
          # 2. 验证一下环境对不对 (调试用)
          echo "Environment Ready. Will use python from:"
          echo "$CONDA_BIN"

      # --- 第二步：拉取当前代码 ---
      # 只需要拉取 vLLM-Kunlun，不需要 upstream，因为镜像里肯定装了 vllm
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- 第三步：链接代码 (核心) ---
      # 这一步不是为了下载包，而是为了让环境用到您“刚写的代码”，而不是“镜像里老的代码”
      - name: Link Current Code
        run: |
          echo "Linking current source code to environment..."
          
          # -e . : Editable 模式，直接把当前文件夹挂载到 Python 库里
          # --no-deps : 关键！告诉 pip "别检查依赖，我环境里全都有，别给我联网下载"
          # --no-build-isolation : 关键！直接用环境里的工具，别创建虚拟环境
          python -m pip install -e . --no-deps --no-build-isolation

      # --- 第四步：运行测试 ---
      - name: Run Unit Test
        run: |
          # 1. 确认驱动状态
          xpu-smi || echo "Warning: xpu-smi command not found"
          
          # 2. 确认 pytest 也是用的环境里的
          which pytest
          
          # 3. 跑测试
          # 此时 pytest 会测试您刚才 checkout 下来的代码
          pytest -v -s --cov tests/ut