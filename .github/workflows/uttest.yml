name: Kunlun Unit Test

on: [push, pull_request]

jobs:
  test-kunlun:
    runs-on: [self-hosted, test-0]

    env:
      http_proxy: http://10.63.229.53:8891
      https_proxy: https://10.63.229.53:8891
      no_proxy: localhost,127.0.0.1,0.0.0.0,.baidu.com,.baidu-int.com
      # 保持这个变量，以防万一
      VLLM_TARGET_DEVICE: empty 

    steps:
      # --- 第一步：环境配置 ---
      - name: Configure Environment
        run: |
          CONDA_BIN="/root/miniconda/envs/python310_torch25_cuda/bin"
          echo "$CONDA_BIN" >> $GITHUB_PATH
          echo "PY=$CONDA_BIN/python" >> $GITHUB_ENV


      # --- 第二步：拉取 vLLM-Kunlun 代码 ---
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # 加上 fetch-depth: 0 避免浅克隆带来的 git 报错
          fetch-depth: 0

      # --- 第三步：安装当前项目 (vLLM-Kunlun) ---
      - name: Install Project
        run: |
          echo "Installing vLLM-Kunlun..."
          # 1. 补齐 hatchling 等构建工具 (以防万一环境里没装)
          $PY -m pip install hatchling editables pytest pytest-cov
          
          # 2. 安装本项目
          # --no-deps: 关键！千万别让它去 PyPI 重新下载 vllm，直接用我们预装好的
          # -e .: 挂载当前代码
          $PY -m pip install -e . --no-deps --no-build-isolation

      # --- 第四步：运行测试 (修复版) ---
      - name: Run Unit Test
        run: |
          # 1. 动态找到当前环境里 PyTorch 的库路径 (/root/.../lib/python3.10/site-packages/torch/lib)
          # 使用 $PY 变量或者直接用环境里的 python
          TORCH_LIB_PATH=$(python -c "import os, torch; print(os.path.join(os.path.dirname(torch.__file__), 'lib'))")
          
          echo "Found Torch Lib Path: $TORCH_LIB_PATH"

          # 2. 【核心修复 A】解决 libxpu_blas.so 找不到的问题
          # 把 torch/lib 加入到系统查找路径里
          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:$TORCH_LIB_PATH:/usr/local/lib
          
          # 3. 【核心修复 B】解决 undefined symbol: _ZN3c10... 的问题
          # 强制系统在加载任何插件前，先把 PyTorch 核心库 (libtorch_cpu.so) 加载进去
          # 这样 torch_xmlir 就能找到它需要的符号了
          export LD_PRELOAD=$TORCH_LIB_PATH/libtorch_cpu.so
          
          echo "Debug: LD_PRELOAD is set to $LD_PRELOAD"

          # 4. 运行测试
          # -p no:warnings 是为了不让那些 "driver too old" 的警告刷屏
          pytest -v -s --cov tests/ut -p no:warnings