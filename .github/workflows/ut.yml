# 1. 给这个工作流起个名字
name: First Action

# 2. 什么时候运行？(当有代码推送到仓库时)
on: [push]

# 3. 要干什么活？
jobs:
  # 定义一个叫 say-hello 的任务
  say-hello:
    # 决定在哪里运行？(使用 GitHub 免费提供的 Ubuntu 虚拟机)
    runs-on: ubuntu-latest
    
    # 具体步骤
    steps:
      # 步骤 1: 只是简单打印一句话
      - name: Print Hello
        run: echo "Hello, GitHub Actions!"
      
      # 步骤 2: 查看一下当前目录有哪些文件
      - name: List files
        run: ls -la