name: Run Unit Tests (Python 3.10)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-on-kunlun:
    runs-on: [self-hosted, test-0]

    steps:
      # 1. 拉代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Python 环境确认
      - name: Check Python
        run: |
          echo "User: $(whoami)"
          which python3 || true
          python3 --version
          python3 -m site --user-site

      # 3. 安装依赖 + 跑 UT（不使用虚拟环境）
      - name: Install deps & run UT
        run: |
          # 确保用户级 pip 路径生效
          export PATH="$HOME/.local/bin:$PATH"

          # 升级 pip（用户级）
          python3 -m pip install --user -U pip setuptools wheel

          # pytest
          python3 -m pip install --user pytest

          # 项目依赖
          if [ -f requirements.txt ]; then
            python3 -m pip install --user -r requirements.txt
          fi

          # 安装当前项目（用户级 editable）
          python3 -m pip install --user -e .

          echo "===== Running UT ====="
          pytest -v tests/ut
